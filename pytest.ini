[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --reuse-db
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*SQLite.*:UserWarning
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API tests
    sync: Sync operation tests
    trello: Trello-related tests
    onedrive: OneDrive-related tests
    database: Database tests
