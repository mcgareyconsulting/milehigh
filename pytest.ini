[pytest]
# Disable pytest_postgresql plugin if psycopg is not available
# This prevents import errors when running tests.
# Exclude `live` tests (real LLM calls) by default; run them with `pytest -m live`.
addopts = -p no:pytest_postgresql -m "not live"
markers =
    live: makes a real LLM API call (needs ANTHROPIC_API_KEY); excluded by default, run with `pytest -m live`


