[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that may require database or external APIs
    slow: Tests that take longer to run
    api: Tests that interact with external APIs (Trello, OneDrive)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
